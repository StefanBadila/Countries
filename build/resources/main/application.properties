spring.application.name=Countries
# 1. Configurare conexiune (URL, User, Parol?)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Configurare JPA / Hibernate
# 'update' înseamn? c? Hibernate va crea automat tabelul 'countries' pentru tine
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# 3. Activare Consola H2 (pentru a vedea tabelul în browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.springframework.web=DEBUG
logging.level.com.fasterxml.jackson=DEBUG